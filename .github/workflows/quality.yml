name: Project quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest -q

      - name: Reconcile executive metrics
        run: python scripts/validate_retail_metrics.py

      - name: Validate Power BI Project structure
        run: python scripts/validate_pbip_project.py
